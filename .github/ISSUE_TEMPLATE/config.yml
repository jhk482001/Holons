blank_issues_enabled: false
contact_links:
  - name: 💬 Question / "How do I…?"
    url: https://github.com/jhk482001/Holons/discussions/categories/q-a
    about: Open a Q&A discussion instead — installation, configuration, "how do I write workflow X" — those belong in Discussions, not Issues.
  - name: 💡 Feature idea (early-stage)
    url: https://github.com/jhk482001/Holons/discussions/categories/ideas
